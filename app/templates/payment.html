<!DOCTYPE html>
<html>
<head>

    <title>ClydeBridge Payments</title>

    <style>

        body{

            font-family:Arial;
            background:#f5f5f5;
        }

        .card{

            width:420px;

            margin:50px auto;

            background:white;

            padding:30px;

            border-radius:10px;

            box-shadow:0 0 20px rgba(0,0,0,.1);

        }

        h2{

            color:#008060;

        }

        input{

            width:100%;

            padding:12px;

            margin-top:10px;

            margin-bottom:20px;

        }

        button{

            width:100%;

            padding:15px;

            background:#008060;

            color:white;

            border:none;

            cursor:pointer;

            font-size:16px;

        }

    </style>

</head>

<body>

<div class="card">

<h2>{{ company }}</h2>

<p><strong>Invoice</strong><br>{{ invoice_number }}</p>

<p><strong>Customer</strong><br>{{ customer }}</p>

<p><strong>Amount Due</strong></p>

<h1>{{ currency }} {{ amount }}</h1>

<form>

<label>Phone Number</label>

<input
type="text"
placeholder="2547XXXXXXXX"
>

<button>

Pay with M-Pesa

</button>

</form>

</div>

</body>

</html>
