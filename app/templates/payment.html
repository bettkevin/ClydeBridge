<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ClydeBridge Payments</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
        }

        .container{
            width:100%;
            display:flex;
            justify-content:center;
            margin-top:50px;
        }

        .card{
            width:420px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
        }

        h2{
            color:#008060;
            text-align:center;
            margin-bottom:30px;
        }

        .label{
            font-weight:bold;
            color:#444;
            margin-top:15px;
        }

        .value{
            margin-bottom:15px;
            color:#666;
        }

        .amount{
            font-size:34px;
            color:#008060;
            font-weight:bold;
            margin-bottom:25px;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:5px;
            margin-top:8px;
            margin-bottom:20px;
            box-sizing:border-box;
        }

        button{
            width:100%;
            padding:15px;
            border:none;
            border-radius:5px;
            background:#008060;
            color:white;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#006d52;
        }

        .footer{
            text-align:center;
            color:#999;
            margin-top:25px;
            font-size:12px;
        }

    </style>

</head>

<body>

<div class="container">

<div class="card">

<h2>{{ company }}</h2>

<div class="label">Invoice</div>
<div class="value">{{ invoice_number }}</div>

<div class="label">Customer</div>
<div class="value">{{ customer }}</div>

<div class="label">Amount Due</div>

<div class="amount">
{{ currency }} {{ amount }}
</div>

<form method="post">

    <input
        type="hidden"
        name="invoice_number"
        value="{{ invoice_number }}"
    >

    <input
        type="hidden"
        name="amount"
        value="{{ amount }}"
    >

    <label class="label">
        M-Pesa Phone Number
    </label>

    <input
        type="text"
        name="phone"
        placeholder="254712345678"
        required
    >

    <button type="submit">
        Pay with M-Pesa
    </button>

</form>

<div class="footer">
Powered by ClydeBridge
</div>

</div>

</div>

</body>

</html>
