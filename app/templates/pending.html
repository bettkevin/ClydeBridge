<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ClydeBridge Payments</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            background:#f5f5f5;
            margin:0;
            padding:0;
        }

        .container{
            width:100%;
            display:flex;
            justify-content:center;
            margin-top:50px;
        }

        .card{
            width:420px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 5px 20px rgba(0,0,0,.15);
            text-align:center;
        }

        .icon{
            font-size:64px;
            margin-bottom:10px;
        }

        h2{
            color:#008060;
            margin-bottom:10px;
        }

        p{
            color:#555;
            line-height:1.6;
        }

        .phone{
            font-size:20px;
            font-weight:bold;
            color:#333;
            margin:10px 0;
        }

        .label{
            font-weight:bold;
            color:#444;
            margin-top:20px;
            text-align:left;
        }

        .value{
            color:#666;
            text-align:left;
            margin-bottom:10px;
        }

        .divider{
            border:none;
            border-top:1px solid #eee;
            margin:20px 0;
        }

        .footer{
            text-align:center;
            color:#999;
            margin-top:25px;
            font-size:12px;
        }

    </style>

</head>

<body>

<div class="container">

<div class="card">

    <div class="icon">📲</div>

    <h2>Check Your Phone</h2>

    <p>
        An M-Pesa STK Push has been sent to
    </p>

    <div class="phone">{{ phone }}</div>

    <p>
        Enter your M-Pesa PIN to complete the payment.
        Do not close this page until you have confirmed.
    </p>

    <hr class="divider">

    <div class="label">Invoice</div>
    <div class="value">{{ invoice_number }}</div>

    <div class="label">Amount</div>
    <div class="value">KES {{ amount }}</div>

    <hr class="divider">

    <div class="footer">
        Powered by ClydeBridge
    </div>

</div>

</div>

</body>

</html>
